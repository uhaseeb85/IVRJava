# ── Server ──────────────────────────────────────────────────────────────────
server.port=8081

# ── SQLite Datasource ───────────────────────────────────────────────────────
spring.datasource.url=jdbc:sqlite:ivr-auth.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# ── Session Configuration ───────────────────────────────────────────────────
ivr.session.ttl-minutes=30
ivr.session.cleanup.interval=60000

# ── Jackson ─────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
spring.jackson.time-zone=UTC

# ── Brand Config Directory ───────────────────────────────────────────────────
ivr.brands.config-dir=./config/brands

# ── Transfer Configuration ───────────────────────────────────────────────────
ivr.transfer.config-dir=./config/transfers
