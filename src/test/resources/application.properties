# Test configuration
server.port=0

spring.datasource.url=jdbc:sqlite:target/test-ivr-auth.db
spring.datasource.driver-class-name=org.sqlite.JDBC

ivr.session.ttl-minutes=30
ivr.session.cleanup.interval=60000

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
spring.jackson.time-zone=UTC

ivr.brands.config-dir=./config/brands
ivr.transfer.config-dir=./config/transfers
